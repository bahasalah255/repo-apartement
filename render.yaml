services:
  - type: web
    name: rbnb-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: rbnb
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: rbnb-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false

  - type: web
    name: rbnb-frontend
    env: docker
    rootDir: front-end
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: rbnb-db
    plan: starter